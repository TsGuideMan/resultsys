<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-School Management System</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
<!-- Login Page -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-school"></i></div>
    <h2 class="login-title">Multi-School Management</h2>
    <p class="login-subtitle">NEB Result Management System</p>
    <div id="loginError" class="login-error" style="display:none;"></div>
    <form id="loginForm" onsubmit="return App.handleLogin(event)">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" id="loginUsername" class="form-control" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div style="position:relative;">
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required autocomplete="current-password" style="padding-right:38px;">
          <span id="pwToggle" onclick="App.togglePassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af;font-size:16px;user-select:none;"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary w-full" style="padding:10px;font-size:15px;">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <div class="login-footer">
      <p>Default: admin / admin123</p>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <aside id="sidebar">
    <div class="sidebar-header" style="display:flex;align-items:center;gap:10px;padding:12px 15px;">
      <div id="sidebarLogo" style="display:none;flex-shrink:0;"></div>
      <div style="min-width:0;flex:1;">
        <div id="schoolNameDisplay" style="font-size:12px;font-weight:600;color:#93c5fd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">School Name</div>
        <div id="userRoleDisplay" style="font-size:10px;color:rgba(255,255,255,0.5);">Loading...</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div style="padding:8px 12px;border-top:1px solid rgba(255,255,255,0.1);">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <i class="fas fa-calendar-alt" style="font-size:10px;color:rgba(255,255,255,0.5);"></i>
          <span style="flex:1;font-size:10px;color:rgba(255,255,255,0.5);font-weight:500;letter-spacing:0.3px;">ACADEMIC SESSION</span>
          <span id="sessionStatus" style="font-size:9px;color:#34d399;display:none;"><i class="fas fa-check-circle"></i> Saved</span>
        </div>
        <div style="display:flex;gap:4px;">
          <select id="sessionDropdown" onchange="App.changeSession(this.value)" style="flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer;outline:none;appearance:auto;">
            <option value="">— Select —</option>
          </select>
          <button id="btnBackup" title="Backup Database" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">&#128190;</button>
        </div>
      </div>
    </div>
  </aside>
  <main id="main-content">
    <header class="top-bar">
        <div style="display:flex;align-items:center;gap:10px;">
          <button id="sidebarToggle" class="btn btn-sm btn-outline" onclick="App.toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:4px 8px;" title="Toggle Sidebar"><i class="fas fa-bars"></i></button>
          <div class="page-title" id="pageTitle">Dashboard</div>
        </div>
      <div class="top-bar-actions">
        <input type="text" id="globalSearch" placeholder="Search students..." style="display:none;">
        <span id="schoolSwitcher" style="display:none;margin-right:4px;">
          <select id="schoolSwitcherSelect" onchange="App.switchSchool(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px;max-width:180px;">
            <option value="">All Schools</option>
          </select>
        </span>
        <button id="btnUpdate" class="btn btn-sm btn-update" onclick="App.checkUpdate()" title="Check for Updates"><i class="fas fa-sync-alt"></i> Update</button>
        <div class="user-menu">
          <button class="btn btn-sm btn-outline" onclick="App.toggleUserMenu()"><i class="fas fa-user-circle"></i> <span id="userMenuName">User</span> <i class="fas fa-caret-down"></i></button>
          <div id="userMenuDropdown" class="user-menu-dropdown" style="display:none;">
            <a href="#" onclick="App.showUserProfile()"><i class="fas fa-id-card"></i> Profile</a>
            <a href="#" onclick="App.showChangePassword()"><i class="fas fa-key"></i> Change Password</a>
            <hr>
            <a href="#" onclick="App.exportData('full')"><i class="fas fa-download"></i> Backup Data</a>
            <a href="#" onclick="App.showAboutModal()"><i class="fas fa-info-circle"></i> About</a>
            <a href="#" onclick="App.showUserGuide()"><i class="fas fa-book-open"></i> Software User Guide</a>
            <hr>
            <a href="#" onclick="App.logout()" style="color:#e74c3c;"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>
    <div class="content" id="pageContent"></div>
  </main>
</div>
<div id="modalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal" id="modalContent"></div>
</div>
<script src="../node_modules/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
// Dashboard card controls: minimize / maximize and responsive enhancements
(function(){
  function enhanceDashboardCards() {
    const cards = document.querySelectorAll('#pageContent .report-card');
    cards.forEach(card => {
      if (card.dataset.enhanced) return; card.dataset.enhanced = '1';
      // wrap existing header text
      const h3 = card.querySelector('h3');
      if (h3) {
        const controls = document.createElement('span'); controls.className = 'panel-controls';
        const btnMin = document.createElement('button'); btnMin.title='Minimize'; btnMin.innerHTML = '<i class="fas fa-minus"></i>';
        const btnMax = document.createElement('button'); btnMax.title='Maximize'; btnMax.innerHTML = '<i class="fas fa-expand"></i>';
        controls.appendChild(btnMin); controls.appendChild(btnMax);
        h3.appendChild(controls);
        const body = card.querySelector('.report-body') || (function(){
          const wrap = document.createElement('div');
          wrap.className = 'report-body';
          while(h3.nextSibling) wrap.appendChild(h3.nextSibling);
          card.appendChild(wrap);
          return wrap;
        })();
        btnMin.addEventListener('click', (e)=>{ card.classList.toggle('collapsed'); e.stopPropagation(); });
        btnMax.addEventListener('click', (e)=>{ card.classList.toggle('fullscreen'); // swap icon
          const icon = btnMax.querySelector('i'); if (card.classList.contains('fullscreen')) icon.className='fas fa-compress'; else icon.className='fas fa-expand'; e.stopPropagation(); });
      }
    });
  }
  const observer = new MutationObserver((mutations)=>{ enhanceDashboardCards(); });
  document.addEventListener('DOMContentLoaded', ()=>{ enhanceDashboardCards(); const pc = document.getElementById('pageContent'); if (pc) observer.observe(pc, { childList:true, subtree:true }); });
})();
</script>
</body>
</html>
